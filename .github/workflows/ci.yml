# ============================================================
# OBS - CI Pipeline (Lint → Test → Build)
# ============================================================
# Bu workflow her PR açıldığında ve dev/main branch'lerine
# push yapıldığında otomatik olarak çalışır.
# 3 aşama başarısız olursa PR merge edilemez.
# ============================================================

name: CI Pipeline

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

# Aynı branch için yeni push gelirse eski çalışan workflow iptal olur
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # ADIM 1: LINT — Kod stili ve yazım kontrolü
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: ESLint çalıştır
        run: npx eslint . --max-warnings 0

      - name: Prettier format kontrolü
        run: npx prettier --check .

  # ──────────────────────────────────────────────
  # ADIM 2: TEST — Unit testlerini çalıştır
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Jest testlerini çalıştır
        run: npx jest --ci --coverage --passWithNoTests

  # ──────────────────────────────────────────────
  # ADIM 3: BUILD — Projeyi derle
  # Lint ve Test başarılı olduktan SONRA çalışır
  # ──────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint, test] # ← lint ve test başarılı olmalı!
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Backend build
        run: npm run build --if-present
